<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="pacGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#20B2AA"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#pacGradient)"/>
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="white" stroke-width="3" opacity="0.3"/>
  <!-- PAC text -->
  <text x="100" y="90" font-family="Arial, sans-serif" font-size="48" font-weight="800" fill="white" text-anchor="middle">PAC</text>
  <!-- Number 47 -->
  <text x="100" y="140" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="white" text-anchor="middle" opacity="0.9">47</text>
</svg>
